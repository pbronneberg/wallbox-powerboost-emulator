name: Build

on:
  push:
  pull_request:

jobs:
  check:
    name: ESPHome and host tests
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install tools
        run: python -m pip install -r requirements.txt
      - name: Run checks
        run: make check
